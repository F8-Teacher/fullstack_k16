services:
  mysql:
    container_name: "f8k16_mysql"
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data
volumes:
  db_data:
  redis_data:
